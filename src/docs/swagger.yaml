openapi: 3.0.3
info:
  title: Jolie Bar & Restaurant API
  description: >-
    Comprehensive API for the Jolie bar ordering system — managing dishes,
    ingredients, orders, reservations, cart, payments, users, and more.
  version: '1.0.0'
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: /
    description: Development server (relative)
  - url: https://bar-backend-y9sr.onrender.com
    description: Production server


tags:
  - name: Health
    description: Health check endpoint
  - name: Auth
    description: Authentication and authorization
  - name: Users
    description: User profile and admin user management
  - name: Addresses
    description: User delivery addresses
  - name: Payment Methods
    description: User payment methods
  - name: Ingredients
    description: Ingredient management
  - name: Dishes
    description: Dish management and dish-ingredient relations
  - name: Cart
    description: Shopping cart operations
  - name: Orders
    description: Order placement, tracking, and admin management
  - name: Reservations
    description: Table reservations for users and admins
  - name: Tables
    description: Restaurant table management
  - name: Settings
    description: Restaurant settings
  - name: Locations
    description: Restaurant location management

security:
  - bearerAuth: []

paths:
  # ──────────────────────────────────────────────
  # Health
  # ──────────────────────────────────────────────
  /health:
    get:
      tags:
        - Health
      summary: Health check
      security: []
      operationId: healthCheck
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '400':
          $ref: '#/components/responses/BadRequest'

  # ──────────────────────────────────────────────
  # Auth
  # ──────────────────────────────────────────────
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      security: []
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Log in a user
      security: []
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token
      security: []
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Log out the current user
      security: []
      operationId: logout
      responses:
        '200':
          description: Logged out successfully
        '400':
          $ref: '#/components/responses/BadRequest'

  # ──────────────────────────────────────────────
  # Users
  # ──────────────────────────────────────────────
  /users/me:
    get:
      tags:
        - Users
      summary: Get current user profile
      operationId: getMe
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags:
        - Users
      summary: Update current user profile
      operationId: updateMe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/admin/all:
    get:
      tags:
        - Users
      summary: List all users (admin)
      operationId: adminGetAllUsers
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: search
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
            enum:
              - USER
              - ADMIN
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/admin/{userId}:
    get:
      tags:
        - Users
      summary: Get a user by ID (admin)
      operationId: adminGetUser
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Users
      summary: Update a user (admin)
      operationId: adminUpdateUser
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Users
      summary: Delete a user (admin)
      operationId: adminDeleteUser
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '204':
          description: User deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────────────────────────
  # Addresses
  # ──────────────────────────────────────────────
  /addresses:
    post:
      tags:
        - Addresses
      summary: Create a new address
      operationId: createAddress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAddressRequest'
      responses:
        '201':
          description: Address created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags:
        - Addresses
      summary: List all addresses for current user
      operationId: getAddresses
      responses:
        '200':
          description: List of addresses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /addresses/{id}:
    patch:
      tags:
        - Addresses
      summary: Update an address
      operationId: updateAddress
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAddressRequest'
      responses:
        '200':
          description: Address updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Addresses
      summary: Delete an address
      operationId: deleteAddress
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Address deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /addresses/{id}/default:
    patch:
      tags:
        - Addresses
      summary: Set an address as default
      operationId: setDefaultAddress
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Address set as default
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────────────────────────
  # Payment Methods
  # ──────────────────────────────────────────────
  /payment:
    post:
      tags:
        - Payment Methods
      summary: Create a payment method
      operationId: createPaymentMethod
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentMethodRequest'
      responses:
        '201':
          description: Payment method created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags:
        - Payment Methods
      summary: List all payment methods
      operationId: getPaymentMethods
      responses:
        '200':
          description: List of payment methods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentMethod'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /payment/{id}:
    get:
      tags:
        - Payment Methods
      summary: Get a payment method by ID
      operationId: getPaymentMethod
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Payment method details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Payment Methods
      summary: Update a payment method
      operationId: updatePaymentMethod
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePaymentMethodRequest'
      responses:
        '200':
          description: Payment method updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Payment Methods
      summary: Delete a payment method
      operationId: deletePaymentMethod
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Payment method deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /payment/{id}/default:
    patch:
      tags:
        - Payment Methods
      summary: Set a payment method as default
      operationId: setDefaultPaymentMethod
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Payment method set as default
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────────────────────────
  # Ingredients
  # ──────────────────────────────────────────────
  /ingredients:
    get:
      tags:
        - Ingredients
      summary: List all ingredients
      security: []
      operationId: getIngredients
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            enum:
              - name
              - price
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        '200':
          description: List of ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags:
        - Ingredients
      summary: Create an ingredient (admin)
      operationId: createIngredient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIngredientRequest'
      responses:
        '201':
          description: Ingredient created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /ingredients/{id}:
    get:
      tags:
        - Ingredients
      summary: Get an ingredient by ID
      security: []
      operationId: getIngredient
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Ingredient details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Ingredients
      summary: Update an ingredient (admin)
      operationId: updateIngredient
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIngredientRequest'
      responses:
        '200':
          description: Ingredient updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Ingredients
      summary: Delete an ingredient (admin)
      operationId: deleteIngredient
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Ingredient deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /ingredients/{id}/dishes:
    get:
      tags:
        - Ingredients
      summary: Get dishes that use this ingredient
      security: []
      operationId: getIngredientDishes
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: List of dishes using this ingredient
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dish'
        '404':
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────────────────────────
  # Dishes
  # ──────────────────────────────────────────────
  /dishes:
    get:
      tags:
        - Dishes
      summary: List all dishes
      security: []
      operationId: getDishes
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
            enum:
              - BREAKFAST
              - LUNCH
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: minCalories
          in: query
          schema:
            type: number
        - name: maxCalories
          in: query
          schema:
            type: number
        - name: isAvailable
          in: query
          schema:
            type: boolean
        - name: sortBy
          in: query
          schema:
            type: string
            enum:
              - name
              - price
              - calories
              - protein
              - fat
              - carbs
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        '200':
          description: List of dishes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dish'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags:
        - Dishes
      summary: Create a dish (admin)
      operationId: createDish
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDishRequest'
      responses:
        '201':
          description: Dish created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dish'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /dishes/{id}:
    get:
      tags:
        - Dishes
      summary: Get a dish by ID
      security: []
      operationId: getDish
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Dish details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dish'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Dishes
      summary: Update a dish (admin)
      operationId: updateDish
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDishRequest'
      responses:
        '200':
          description: Dish updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dish'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Dishes
      summary: Delete a dish (admin)
      operationId: deleteDish
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Dish deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /dishes/{id}/ingredients:
    post:
      tags:
        - Dishes
      summary: Add an ingredient to a dish (admin)
      operationId: addDishIngredient
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddDishIngredientRequest'
      responses:
        '201':
          description: Ingredient added to dish
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DishIngredient'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /dishes/{id}/ingredients/{ingredientId}:
    patch:
      tags:
        - Dishes
      summary: Update a dish ingredient (admin)
      operationId: updateDishIngredient
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/IngredientIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDishIngredientRequest'
      responses:
        '200':
          description: Dish ingredient updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DishIngredient'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Dishes
      summary: Remove an ingredient from a dish (admin)
      operationId: deleteDishIngredient
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/IngredientIdPath'
      responses:
        '204':
          description: Ingredient removed from dish
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /dishes/{id}/image:
    patch:
      tags:
        - Dishes
      summary: Upload or delete a dish image (admin)
      description: |
        **Upload**: Send a `multipart/form-data` request with an `image` field
        containing the file (JPEG · PNG · WebP, max 5 MB).

        **Delete**: Send the request with query parameter `?action=delete`
        (no body required).
      operationId: manageDishImage
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: action
          in: query
          required: false
          schema:
            type: string
            enum:
              - delete
          description: Pass `delete` to remove the current image.
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: Image file (JPEG, PNG or WebP, max 5 MB)
      responses:
        '200':
          description: Dish with updated image URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dish'
        '400':
          description: No file provided, file too large, or invalid format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  # ──────────────────────────────────────────────
  # Cart
  # ──────────────────────────────────────────────
  /cart:
    get:
      tags:
        - Cart
      summary: Get the current user's cart
      operationId: getCart
      responses:
        '200':
          description: Cart contents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags:
        - Cart
      summary: Clear the cart
      operationId: clearCart
      responses:
        '204':
          description: Cart cleared
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cart/items:
    post:
      tags:
        - Cart
      summary: Add a dish item to the cart
      operationId: addCartItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCartItemRequest'
      responses:
        '201':
          description: Item added to cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

