# ════════════════════════════════════════════════
# Components
# ════════════════════════════════════════════════
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ────────────────────────────────────────────
  # Reusable Parameters
  # ────────────────────────────────────────────
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
    UserIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: integer
    OrderIdPath:
      name: orderId
      in: path
      required: true
      schema:
        type: integer
    CartItemIdPath:
      name: cartItemId
      in: path
      required: true
      schema:
        type: integer
    IngredientIdPath:
      name: ingredientId
      in: path
      required: true
      schema:
        type: integer

  # ────────────────────────────────────────────
  # Reusable Responses
  # ────────────────────────────────────────────
  responses:
    BadRequest:
      description: Bad request - validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized - missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # ────────────────────────────────────────────
  # Schemas
  # ────────────────────────────────────────────
  schemas:
    # ── Error ──
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    # ── Auth request / response ──
    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
        - phone
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        phone:
          type: string
          description: Phone number matching the accepted regex pattern

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    LoginResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        accessToken:
          type: string
        refreshToken:
          type: string

    TokenPair:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    # ── User ──
    User:
      type: object
      properties:
        id:
