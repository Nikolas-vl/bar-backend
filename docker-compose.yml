# ──────────────────────────────────────────────────────────
# docker-compose.yml  —  DEVELOPMENT ONLY
#
# Uses bind-mount + ts-node-dev for hot reload.
# For production deploy, use:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# ──────────────────────────────────────────────────────────
services:
  redis:
    image: redis:7.2-alpine
    container_name: jolie_redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes --appendfsync everysec
        else
          redis-server --appendonly yes --appendfsync everysec
        fi
      '
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: >
        sh -c '
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping
          else
            redis-cli ping
          fi
        '
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - jolie_network
  backend:
    build: .
    container_name: jolie_backend
    # Dev: bind-mount source + hot-reload via ts-node-dev
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: npm run dev
    restart: unless-stopped
    ports:
      - '${BACKEND_PORT:-4000}:${BACKEND_PORT:-4000}'
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - jolie_network
  postgres:
    image: postgres:15-alpine
    container_name: jolie_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jolie_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 5
networks:
  jolie_network:
    driver: bridge
volumes:
  redis_data:
  postgres_data:
  node_modules:
